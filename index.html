<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gitae's Lotto Gen</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent: #e94560;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --ball-yellow: #fbc400;
            --ball-blue: #69c8f2;
            --ball-red: #ff7272;
            --ball-gray: #aaaaaa;
            --ball-green: #b0d840;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(to right, #e94560, #0f3460);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1; /* 푸터를 바닥으로 밀기 위해 */
        }

        /* 카드 스타일 */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-sub);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 입력 필드 */
        input[type="date"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #0f3460;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        
        input:focus {
            border-color: var(--accent);
        }

        /* 반자동 선택 그리드 */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .grid-btn {
            aspect-ratio: 1;
            border-radius: 50%;
            border: 1px solid #333;
            background-color: #0f3460;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .grid-btn.selected {
            background-color: var(--accent);
            border-color: var(--accent);
            font-weight: bold;
            transform: scale(1.1);
            box-shadow: 0 0 10px var(--accent);
        }

        /* 생성 버튼 */
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s;
            margin-top: 10px;
        }

        .generate-btn:active {
            transform: scale(0.98);
        }

        /* 결과 영역 */
        .result-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .game-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
            animation: fadeIn 0.5s ease-out;
        }

        .game-label {
            font-size: 0.8rem;
            color: var(--text-sub);
            width: 50px;
            font-weight: bold;
        }

        .balls-wrapper {
            display: flex;
            gap: 6px;
        }

        .ball {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 13px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2);
        }

        /* 로또 공 색상 */
        .ball.yellow { background: var(--ball-yellow); color: #333; text-shadow: none; }
        .ball.blue   { background: var(--ball-blue); }
        .ball.red    { background: var(--ball-red); }
        .ball.gray   { background: var(--ball-gray); }
        .ball.green  { background: var(--ball-green); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reset-btn {
            font-size: 0.8rem;
            color: var(--accent);
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }

        /* 푸터 (서명) 스타일 */
        footer {
            margin-top: 40px;
            padding: 20px 0;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-sub);
            opacity: 0.8;
        }

        footer span {
            color: var(--accent);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>인생 역전 번호 생성기</h1>

    <div class="container">
        
        <!-- 1. 게임 수 설정 -->
        <div class="card">
            <div class="card-title">게임 수 (1~5)</div>
            <input type="number" id="gameCount" min="1" max="5" value="5">
        </div>

        <!-- 2. 특별한 날짜 (옵션) -->
        <div class="card">
            <div class="card-title">특별한 날짜 (선택)</div>
            <input type="date" id="specialDate">
            <div style="font-size: 0.75rem; color: #666; margin-top: 8px; line-height: 1.4;">
                * 날짜에 포함된 숫자(1~45)를 우선 추출합니다.<br>
                (예: 12월 25일 -> 12, 25번 확률 UP)
            </div>
        </div>

        <!-- 3. 반자동 고정수 (옵션) -->
        <div class="card">
            <div class="card-title">
                반자동 고정수 (최대 5개)
                <button class="reset-btn" onclick="resetSelection()">초기화</button>
            </div>
            <div class="number-grid" id="numberGrid">
                <!-- JS로 버튼 생성 -->
            </div>
        </div>

        <button class="generate-btn" onclick="generateLotto()">번호 생성하기</button>

        <div id="resultArea" class="result-container"></div>
    </div>

    <!-- 서명 영역 -->
    <footer>
        Created by <span>Gitae Park</span>
    </footer>

    <script>
        // 전역 변수: 선택된 고정수 저장
        let selectedNumbers = new Set();

        // 초기화: 1~45 버튼 생성
        window.onload = function() {
            const grid = document.getElementById('numberGrid');
            for (let i = 1; i <= 45; i++) {
                const btn = document.createElement('button');
                btn.className = 'grid-btn';
                btn.innerText = i;
                btn.onclick = () => toggleNumber(i, btn);
                grid.appendChild(btn);
            }
        };

        // 번호 선택/해제 로직
        function toggleNumber(num, btn) {
            if (selectedNumbers.has(num)) {
                selectedNumbers.delete(num);
                btn.classList.remove('selected');
            } else {
                if (selectedNumbers.size >= 5) {
                    alert("고정수는 최대 5개까지만 선택 가능합니다.");
                    return;
                }
                selectedNumbers.add(num);
                btn.classList.add('selected');
            }
        }

        // 선택 초기화
        function resetSelection() {
            selectedNumbers.clear();
            document.querySelectorAll('.grid-btn').forEach(btn => btn.classList.remove('selected'));
        }

        // 메인 생성 함수
        function generateLotto() {
            const gameCount = parseInt(document.getElementById('gameCount').value) || 5;
            const dateStr = document.getElementById('specialDate').value;
            const resultArea = document.getElementById('resultArea');
            
            // 결과 영역 초기화
            resultArea.innerHTML = '';

            // 날짜에서 유효한 로또 번호 추출
            let dateNumbers = [];
            if (dateStr) {
                const parts = dateStr.split('-'); // [YYYY, MM, DD]
                parts.forEach(part => {
                    const num = parseInt(part);
                    if (num >= 1 && num <= 45 && !dateNumbers.includes(num)) {
                        dateNumbers.push(num);
                    }
                    // 연도 뒷자리 (예: 1990 -> 90은 X, 2023 -> 23은 O)
                    if (part.length === 4) {
                        const yearShort = parseInt(part.substring(2));
                        if (yearShort >= 1 && yearShort <= 45 && !dateNumbers.includes(yearShort)) {
                            dateNumbers.push(yearShort);
                        }
                    }
                });
            }

            // 게임 수만큼 반복 생성
            for (let i = 0; i < gameCount; i++) {
                const lottoSet = createOneGame(dateNumbers);
                renderGameRow(i + 1, lottoSet);
            }
        }

        // 한 게임 생성 로직 (우선순위: 고정수 > 날짜수 > 랜덤수)
        function createOneGame(dateNumbers) {
            let currentSet = new Set(selectedNumbers); // 1. 고정수 먼저 담기

            // 2. 날짜수 담기 (이미 있는 번호 제외, 6개 꽉 차면 중단)
            for (let num of dateNumbers) {
                if (currentSet.size >= 6) break;
                currentSet.add(num);
            }

            // 3. 나머지 랜덤 채우기
            while (currentSet.size < 6) {
                const rand = Math.floor(Math.random() * 45) + 1;
                currentSet.add(rand);
            }

            // 정렬해서 반환
            return Array.from(currentSet).sort((a, b) => a - b);
        }

        // 화면에 한 줄 그리기
        function renderGameRow(index, numbers) {
            const resultArea = document.getElementById('resultArea');
            
            const row = document.createElement('div');
            row.className = 'game-row';
            
            let ballsHtml = '';
            numbers.forEach(num => {
                let colorClass = '';
                if (num <= 10) colorClass = 'yellow';
                else if (num <= 20) colorClass = 'blue';
                else if (num <= 30) colorClass = 'red';
                else if (num <= 40) colorClass = 'gray';
                else colorClass = 'green';
                
                ballsHtml += `<div class="ball ${colorClass}">${num}</div>`;
            });

            row.innerHTML = `
                <div class="game-label">GAME ${index}</div>
                <div class="balls-wrapper">${ballsHtml}</div>
            `;
            
            resultArea.appendChild(row);
        }
    </script>
</body>
</html>
